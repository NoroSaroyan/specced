name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        # Own the venv explicitly so this is robust to setup-uv version changes.
        run: |
          uv venv --clear --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - name: Format check
        run: uv run --no-sync ruff format --check src tests
      - name: Lint
        run: uv run --no-sync ruff check src tests
      - name: Test
        run: uv run --no-sync pytest
      - name: Build
        run: uv build

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
      - name: Install as a tool and bootstrap a throwaway repo
        run: |
          uv tool install .
          mkdir -p /tmp/smoke && cd /tmp/smoke && git init -q
          printf '[project]\nname="x"\ndependencies=["fastapi"]\n[tool.ruff]\n' > pyproject.toml
          specced detect
          specced init --preset auto
          specced doctor
