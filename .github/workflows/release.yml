name: release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API tokens stored.
# Triggers when you publish a GitHub Release (tag vX.Y.Z), or manually.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/specced
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Verify release tag matches the package version
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          echo "release tag: $tag | pyproject version: $ver"
          test "$tag" = "$ver" || { echo "::error::tag ($tag) != pyproject version ($ver)"; exit 1; }

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
